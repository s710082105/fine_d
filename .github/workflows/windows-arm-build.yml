name: windows-arm-build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: windows-arm-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-11-arm
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --nocapture

      - name: Build frontend
        run: pnpm build

      - name: Build Windows ARM64 bundle
        run: pnpm tauri build --target aarch64-pc-windows-msvc

      - name: Upload Windows ARM64 bundle
        uses: actions/upload-artifact@v4
        with:
          name: finereport-windows-arm64-bundle
          path: src-tauri/target/aarch64-pc-windows-msvc/release/finereport_tauri_shell.exe
          if-no-files-found: error
