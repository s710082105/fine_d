name: build-bridge

on:
  push:
    paths:
      - ".github/workflows/build-bridge.yml"
      - ".codex/**"
      - "bridge/**"
      - "reportlets/**"
      - "tests/fr_runtime/**"
      - "tooling/fr_runtime/**"
      - "AGENTS.md"
      - "README.md"
      - "pyproject.toml"
  pull_request:
    paths:
      - ".github/workflows/build-bridge.yml"
      - ".codex/**"
      - "bridge/**"
      - "reportlets/**"
      - "tests/fr_runtime/**"
      - "tooling/fr_runtime/**"
      - "AGENTS.md"
      - "README.md"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  bridge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Test Dependencies
        run: python -m pip install pytest

      - name: Build Bridge
        run: python bridge/scripts/build_bridge.py --project-root .

      - name: Build Runtime Bundle
        run: python -m tooling.fr_runtime.release_bundle --project-root . --output-dir dist/finereport-runtime-bundle

      - name: Run Runtime Tests
        run: pytest tests/fr_runtime -q

      - name: Upload Runtime Bundle
        uses: actions/upload-artifact@v4
        with:
          name: finereport-runtime-bundle
          path: dist/finereport-runtime-bundle
          include-hidden-files: true
          if-no-files-found: error
