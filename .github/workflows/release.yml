name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 测试 (仅在 Windows ARM runner 上运行) ──────────────────────────
  test:
    runs-on: windows-11-arm
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --nocapture

  # ── Windows x86_64 构建 ────────────────────────────────────────────
  build-windows-x86:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Windows x86_64 bundle
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: finereport-windows-x86_64
          path: src-tauri/target/x86_64-pc-windows-msvc/release/finereport_tauri_shell.exe
          if-no-files-found: error

  # ── Windows ARM64 构建 ─────────────────────────────────────────────
  build-windows-arm:
    runs-on: windows-11-arm
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Windows ARM64 bundle
        run: pnpm tauri build --target aarch64-pc-windows-msvc

      - name: Upload Windows ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: finereport-windows-arm64
          path: src-tauri/target/aarch64-pc-windows-msvc/release/finereport_tauri_shell.exe
          if-no-files-found: error

  # ── macOS ARM64 构建 ───────────────────────────────────────────────
  build-macos-arm:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build macOS ARM64 bundle
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: List build output
        run: ls -R src-tauri/target/aarch64-apple-darwin/release/bundle/ || true

      - name: Package macOS app
        run: |
          # Tauri v2 输出 .app 到 bundle/macos/，dmg 到 bundle/dmg/
          # 优先打包 .app，回退到直接上传二进制
          if [ -d "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" ]; then
            cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
            tar -czf /tmp/FineReport-Codex-Panel-macos-arm64.tar.gz *.app
          else
            cd src-tauri/target/aarch64-apple-darwin/release
            tar -czf /tmp/FineReport-Codex-Panel-macos-arm64.tar.gz finereport_tauri_shell
          fi

      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: finereport-macos-arm64
          path: /tmp/FineReport-Codex-Panel-macos-arm64.tar.gz
          if-no-files-found: error

  # ── Release (仅 tag 触发) ──────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build-windows-x86, build-windows-arm, build-macos-arm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts for release
        run: |
          mv artifacts/finereport-windows-x86_64/finereport_tauri_shell.exe \
             artifacts/FineReport-Codex-Panel-windows-x86_64.exe
          mv artifacts/finereport-windows-arm64/finereport_tauri_shell.exe \
             artifacts/FineReport-Codex-Panel-windows-arm64.exe
          mv artifacts/finereport-macos-arm64/FineReport-Codex-Panel-macos-arm64.tar.gz \
             artifacts/FineReport-Codex-Panel-macos-arm64.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/FineReport-Codex-Panel-windows-x86_64.exe
            artifacts/FineReport-Codex-Panel-windows-arm64.exe
            artifacts/FineReport-Codex-Panel-macos-arm64.tar.gz
